xray_configs:
  - url: "vless://uuid@host:port?security=none&encryption=none&type=tcp#label"

ssh_configs:
  - active: true
    user: "your-ssh-user"
    host: "10.0.0.1"
    port: 22
    private_key: "id_ed25519"
    socks_port: 1081

openvpn_configs:
  - active: true
    profile: "openvpn/profiles/example.ovpn"
    username: "your-username"
    password: "your-password"
